version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - app-network

  worker:
    build: .
    command: celery -A app.infrastructure.workers.celery_app.celery_app worker -l info -Q data_ingestion --concurrency=2
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - app-network

  beat:
    build: .
    command: celery -A app.infrastructure.workers.celery_app.celery_app beat -l info
    env_file:
      - .env
    depends_on:
      - redis
    networks:
      - app-network

  db:
    image: postgres:15-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=tce
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
